<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras - SIGEP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .carrinho-container { max-width: 800px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .item-carrinho { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .formulario-cliente { margin-top: 30px; padding: 20px; background-color: #f9f9f9; border-radius: 8px; }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; }
        .campo input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-finalizar { background-color: #28a745; color: white; padding: 15px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; }
        .btn-finalizar:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="carrinho-container">
        <h1>Seu Carrinho</h1>
        <div id="lista-carrinho">
            <!-- Itens serão carregados aqui via JS -->
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <h2 id="total-carrinho">Total: R$ 0,00</h2>
        </div>

        <div class="formulario-cliente">
            <h3>Dados para Pagamento</h3>
            <div class="campo">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>
            </div>
            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
            </div>
            <div class="campo">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="campo">
                <label for="telefone">Telefone (DDD + Número):</label>
                <input type="text" id="telefone" placeholder="(11) 99999-9999" required>
            </div>
            <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra no PagBank</button>
        </div>
    </div>

    <script>
        // Simulação do carrinho (Substitua pela sua lógica de carregamento real)
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function renderizarCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            let total = 0;
            lista.innerHTML = '';

            if (carrinho.length === 0) {
                lista.innerHTML = '<p>Seu carrinho está vazio.</p>';
                return;
            }

            carrinho.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-carrinho';
                div.innerHTML = `
                    <span>${item.nome} (x${item.quantidade})</span>
                    <span>R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
                `;
                lista.appendChild(div);
                total += item.preco * item.quantidade;
            });

            document.getElementById('total-carrinho').innerText = `Total: R$ ${total.toFixed(2)}`;
        }

        async function finalizarCompra() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            // Limpeza cirúrgica: Remove tudo que não for número do CPF e Telefone
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            const telefone = document.getElementById('telefone').value.replace(/\D/g, '');

            if (!nome || !email || !cpf || !telefone) {
                alert("Por favor, preencha todos os dados obrigatórios.");
                return;
            }

            if (cpf.length !== 11) {
                alert("O CPF deve conter 11 dígitos.");
                return;
            }

            if (telefone.length < 10) {
                alert("O telefone deve conter o DDD e o número.");
                return;
            }

            // O PagBank v4 exige unit_amount em CENTAVOS (Ex: R$ 10,00 -> 1000)
            const items = carrinho.map(item => ({
                reference_id: item.id ? item.id.toString() : "PROD-" + Math.random().toString(36).substr(2, 9),
                name: item.nome,
                quantity: item.quantidade,
                unit_amount: Math.round(parseFloat(item.preco) * 100) 
            }));

            // Montagem do JSON conforme a API v4/v5 do PagBank
            const checkoutData = {
                customer: {
                    name: nome,
                    email: email,
                    tax_id: cpf,
                    phones: [{
                        type: "MOBILE",
                        country: "55",
                        area: telefone.substring(0, 2),
                        number: telefone.substring(2)
                    }]
                },
                items: items,
                redirect_url: "https://wilsonlopes2021.github.io/sucesso.html",
                // Permite que o cliente preencha o endereço na página do PagBank
                shipping: {
                    address_modifiable: true 
                }
            };

            try {
                // ATENÇÃO: Use 'api.pagseguro.com' para PRODUÇÃO
                // Use 'sandbox.api.pagseguro.com' para TESTES
                const response = await fetch('https://api.pagseguro.com/checkouts', { 
                    method: 'POST',
                    headers: {
                        'Authorization': 'effd4abe-ed41-4ba7-a756-861c5473c2d9f37af3f547e88b3a26937eff2d8f2c70ec17-5f77-41e4-bf27-c8c046263e6f', // <--- SUBSTITUA PELO SEU TOKEN REAL
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(checkoutData)
                });

                const data = await response.json();
                
                if (data.links) {
                    // O link 'PAY' é o link do Checkout seguro
                    const checkoutUrl = data.links.find(link => link.rel === 'PAY').href;
                    window.location.href = checkoutUrl; 
                } else {
                    console.error("Erro detalhado do PagBank:", data);
                    const msgErro = data.error_messages ? data.error_messages[0].description : "Erro na API do PagBank.";
                    alert("Erro ao processar pagamento: " + msgErro);
                }
            } catch (error) {
                console.error("Erro na conexão:", error);
                alert("Não foi possível conectar ao servidor de pagamento. Verifique sua internet.");
            }
        }

        // Inicia a renderização ao carregar a página
        renderizarCarrinho();
    </script>
</body>
</html>
