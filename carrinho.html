<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - WMLopes</title>

    <style>
        body { font-family: Arial; }

        .container {
            max-width: 800px;
            margin: 40px auto;
        }

        .item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 10px;
        }

        .btn {
            padding: 10px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-pagar { background: #28a745; color: white; }
        .btn-limpar { background: #dc3545; color: white; }
    </style>
</head>

<body>

<div class="container">
    <h2>Seu Carrinho</h2>

    <div id="lista"></div>

    <h3 id="total">Total: R$ 0,00</h3>

    <button class="btn btn-limpar" onclick="limparCarrinho()">Esvaziar Carrinho</button>
    <button class="btn btn-pagar" onclick="finalizarCompra()">Finalizar Compra</button>
</div>

<script>
let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

function salvarCarrinho() {
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
}

function renderizar() {
    const lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    if (carrinho.length === 0) {
        lista.innerHTML = "<p>Carrinho vazio</p>";
        document.getElementById("total").innerText = "Total: R$ 0,00";
        return;
    }

    carrinho.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>${item.nome} x${item.quantidade}</span>
            <span>R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
        `;

        lista.appendChild(div);
        total += item.preco * item.quantidade;
    });

    document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
}

function limparCarrinho() {
    if (confirm("Deseja esvaziar o carrinho?")) {
        localStorage.removeItem("carrinho");
        carrinho = [];
        renderizar();
    }
}

async function finalizarCompra() {

    if (carrinho.length === 0) {
        alert("Carrinho vazio!");
        return;
    }

    const items = carrinho.map(item => ({
        reference_id: item.id || Math.random().toString(36),
        name: item.nome,
        quantity: item.quantidade,
        unit_amount: Math.round(item.preco * 100)
    }));

    const checkoutData = {
        items: items,
        redirect_url: "https://wilsonlopes2021.github.io/sucesso.html",
        shipping: {
            address_modifiable: true
        }
    };

    try {
        const response = await fetch("https://api.pagseguro.com/checkouts", {
            method: "POST",
            headers: {
                "Authorization": "effd4abe-ed41-4ba7-a756-861c5473c2d9f37af3f547e88b3a26937eff2d8f2c70ec17-5f77-41e4-bf27-c8c046263e6f", // 🔴 COLE SEU TOKEN AQUI
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(checkoutData)
        });

        const data = await response.json();

        if (data.links) {
            const link = data.links.find(l => l.rel === "PAY").href;
            window.location.href = link;
        } else {
            console.error(data);
            alert("Erro ao gerar pagamento");
        }

    } catch (erro) {
        console.error(erro);
        alert("Erro na conexão");
    }
}

renderizar();
</script>

</body>
</html>
