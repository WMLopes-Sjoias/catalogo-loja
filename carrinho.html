<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Terráli</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pagina-carrinho { max-width: 800px; margin: 40px auto; padding: 20px; }
        .pagina-carrinho h2 { color: #5d7a5c; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .carrinho-vazio { text-align: center; padding: 60px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .carrinho-vazio i { font-size: 4em; color: #8b9a6e; margin-bottom: 20px; }
        .carrinho-item { display: grid; grid-template-columns: 100px 1fr auto; gap: 20px; background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); align-items: center; }
        .carrinho-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .item-info h4 { color: #5d7a5c; margin-bottom: 5px; }
        .item-info .preco { color: #8b9a6e; font-weight: bold; font-size: 1.2em; }
        .item-info .codigo-produto { font-size: 0.85em; color: #888; margin-top: 5px; }
        .item-acoes { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .quantidade { display: flex; align-items: center; gap: 10px; background: #f0f3ea; padding: 5px 10px; border-radius: 25px; }
        .quantidade button { background: #5d7a5c; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.2em; }
        .btn-remover { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.9em; display: flex; align-items: center; gap: 5px; }
        .carrinho-resumo { background: white; border-radius: 15px; padding: 20px; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .resumo-linha { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .resumo-linha.total { font-size: 1.3em; font-weight: bold; color: #5d7a5c; border-bottom: none; margin-top: 10px; }
        .botoes-pagamento { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .btn-pagseguro { flex: 1; background: #00a650; color: white; text-decoration: none; padding: 15px; border-radius: 30px; text-align: center; font-weight: bold; font-size: 1.2em; cursor: pointer; border: none; font-family: inherit; }
        .btn-whatsapp-finalizar { flex: 1; background: #25D366; color: white; text-decoration: none; padding: 15px; border-radius: 30px; text-align: center; font-weight: bold; font-size: 1.2em; display: inline-block; }
        .btn-continuar { display: block; background: #f0f3ea; color: #5d7a5c; text-decoration: none; padding: 15px; border-radius: 30px; text-align: center; }
        @media (max-width: 768px) { .carrinho-item { grid-template-columns: 1fr; text-align: center; } .item-acoes { align-items: center; } .botoes-pagamento { flex-direction: column; } }
    </style>
</head>
<body>

<header id="cabecalho">
    <h1><i class="fas fa-leaf"></i> Terráli<sup>™</sup></h1>
    <p class="subtitulo-cabecalho">Sua Joia em Cerâmica Autoral</p>
    <nav>
        <a href="index.html">Início</a>
        <a href="novidades.html">Novidades</a>
        <a href="sobre.html">Sobre Nós</a>
        <a href="contato.html">Contato</a>
        <a href="carrinho.html" class="active">🛒 <span id="carrinho-contador">0</span></a>
    </nav>
</header>

<main>
    <section class="pagina-carrinho">
        <h2><i class="fas fa-shopping-cart"></i> Meu Carrinho</h2>
        <div id="carrinho-conteudo">
            <!-- JavaScript carrega o conteúdo aqui -->
        </div>
    </section>
</main>

<footer>
    <div class="footer-content">
        <div>
            <h4>Terráli<sup>™</sup></h4>
            <p>Peças artesanais com a pureza da natureza</p>
        </div>
        <div>
            <h4>Atendimento</h4>
            <p>📞 (19) 99657-6067</p>
            <p>🕒 Seg-Sex: 9h às 18h</p>
        </div>
    </div>
    <p style="margin-top: 30px;">2026 Wilson Lopes Junior. Terráli<sup>™</sup>.</p>
</footer>

<script src="js/carrinho.js"></script>
<script>
    // 1. FUNÇÃO PARA FINALIZAR O PAGAMENTO
    function finalizarPagamento() {
        const total = window.carrinho.total;
        if (total <= 0) {
            alert("Carrinho vazio!");
            return;
        }

        const descricao = "Pedido Terráli - " + new Date().toLocaleString();
        
        // URL DO SEU GOOGLE SCRIPT (COLOQUE A URL QUE VOCÊ OBTEVE NO DEPLOY)
        const scriptURL = "https://script.google.com/macros/s/AKfycbxtkPkSG9ejuM7kKHUsEGLsgVROkMNx114mvb0F-JetGpmfGRtNs7GPZXweNszLokJi/exec";
        const urlFinal = `${scriptURL}?total=${total.toFixed(2)}&descricao=${encodeURIComponent(descricao)}`;

        const btn = document.querySelector('.btn-pagseguro');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando pagamento...';
        btn.disabled = true;

        fetch(urlFinal)
            .then(response => response.text())
            .then(link => {
                if (link.startsWith("http")) {
                    window.location.href = link;
                } else {
                    alert("Atenção: " + link);
                    btn.innerHTML = textoOriginal;
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("Erro ao conectar: Verifique se o Script está publicado como 'Qualquer pessoa'.");
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
    }

    // 2. FUNÇÃO PARA CARREGAR OS ITENS NA TELA
    function carregarCarrinhoNaPagina() {
        const conteudo = document.getElementById('carrinho-conteudo');
        const itens = window.carrinho.itens;
        
        if (!itens || itens.length === 0) {
            conteudo.innerHTML = `
                <div class="carrinho-vazio">
                    <i class="fas fa-shopping-cart"></i>
                    <h3>Seu carrinho está vazio</h3>
                    <a href="index.html" class="btn-continuar" style="display: inline-block; padding: 10px 30px; margin-top: 20px;">Continuar Comprando</a>
                </div>`;
            return;
        }

        let html = '';
        itens.forEach(item => {
            html += `
                <div class="carrinho-item">
                    <img src="${item.imagem || 'imagens/placeholder.jpg'}" alt="${item.nome}">
                    <div class="item-info">
                        <h4>${item.nome}</h4>
                        <div class="preco">R$ ${item.preco}</div>
                        <div class="codigo-produto">Código: ${item.codigo}</div>
                    </div>
                    <div class="item-acoes">
                        <div class="quantidade">
                            <button onclick="window.carrinho.atualizarQuantidade('${item.codigo}', ${item.quantidade - 1})">-</button>
                            <span>${item.quantidade}</span>
                            <button onclick="window.carrinho.atualizarQuantidade('${item.codigo}', ${item.quantidade + 1})">+</button>
                        </div>
                        <button onclick="window.carrinho.remover('${item.codigo}')" class="btn-remover">
                            <i class="fas fa-trash"></i> Remover
                        </button>
                    </div>
                </div>`;
        });

        html += `
            <div class="carrinho-resumo">
                <div class="resumo-linha total">
                    <span>Total:</span>
                    <span>R$ ${window.carrinho.total.toFixed(2)}</span>
                </div>
                <div class="botoes-pagamento">
                    <button onclick="finalizarPagamento()" class="btn-pagseguro">
                        <i class="fas fa-credit-card"></i> Pagar com Cartão/Pix
                    </button>
                    <a href="https://wa.me/5519996576067?text=${encodeURIComponent(window.carrinho.gerarMensagemWhatsApp())}" 
                       target="_blank" class="btn-whatsapp-finalizar">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                </div>
                <a href="index.html" class="btn-continuar">Continuar Comprando</a>
            </div>`;

        conteudo.innerHTML = html;
        document.getElementById('carrinho-contador').innerText = window.carrinho.itens.reduce((acc, i) => acc + i.quantidade, 0);
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', carregarCarrinhoNaPagina);
    // Sobrescreve a função de renderização do seu objeto global para atualizar a página quando mudar algo
    const originalAtualizar = window.carrinho.renderizar;
    window.carrinho.renderizar = function() {
        if(originalAtualizar) originalAtualizar();
        carregarCarrinhoNaPagina();
    };
</script>

</body>
</html>
