<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - WMLopes</title>

    <style>
        body { font-family: Arial; }

        .container {
            max-width: 800px;
            margin: 40px auto;
        }

        .item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 10px;
        }

        .btn {
            padding: 10px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-pagar { background: #28a745; color: white; }
        .btn-limpar { background: #dc3545; color: white; }
    </style>
</head>

<body>

<div class="container">
    <h2>Seu Carrinho</h2>

    <div id="lista"></div>

    <h3 id="total">Total: R$ 0,00</h3>

    <button class="btn btn-limpar" onclick="limparCarrinho()">Esvaziar Carrinho</button>
    <button class="btn btn-pagar" onclick="finalizarCompra()">Finalizar Compra</button>
</div>

<script>
let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

function salvarCarrinho() {
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
}

function renderizar() {
    const lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    if (carrinho.length === 0) {
        lista.innerHTML = "<p>Carrinho vazio</p>";
        document.getElementById("total").innerText = "Total: R$ 0,00";
        return;
    }

    carrinho.forEach((item) => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>${item.nome} x${item.quantidade}</span>
            <span>R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
        `;

        lista.appendChild(div);
        total += item.preco * item.quantidade;
    });

    document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
}

// 🔥 LIMPAR CARRINHO (COM REDIRECIONAMENTO)
function limparCarrinho() {
    if (confirm("Deseja esvaziar o carrinho?")) {
        localStorage.removeItem("carrinho");
        carrinho = [];
        window.location.href = "index.html";
    }
}

// 🔥 PAGAMENTO VIA GOOGLE SCRIPT (SEM CORS)
async function finalizarCompra() {

    if (carrinho.length === 0) {
        alert("Carrinho vazio!");
        return;
    }

    const total = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);

    const descricao = "Pedido WMLopes - " + new Date().toLocaleString();

    const url = "https://script.google.com/macros/s/AKfycbx2bJuI842Ol5WZmPpNRFpe6aOw1F034f_oe5-rLcMyEoppSsypxwVOfm2N6msABlxL/exec"
        + "?total=" + total.toFixed(2)
        + "&descricao=" + encodeURIComponent(descricao);

    const btn = document.querySelector('.btn-pagar');
    const textoOriginal = btn.innerHTML;

    btn.innerHTML = "Gerando pagamento...";
    btn.disabled = true;

    try {
        const response = await fetch(url);
        const link = await response.text();

        console.log("Resposta do script:", link);

        if (link.includes("pagseguro")) {
            window.location.href = link;
        } else {
            alert("Erro ao gerar pagamento: " + link);
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }

    } catch (erro) {
        console.error("Erro:", erro);
        alert("Erro na integração: " + erro.message);
        btn.innerHTML = textoOriginal;
        btn.disabled = false;
    }
}

// 🔥 INICIALIZA
renderizar();
</script>

</body>
</html>
