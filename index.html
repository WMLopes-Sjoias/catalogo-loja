<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terráli - Cerâmica Autoral</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header id="cabecalho">
    <h1><i class="fas fa-leaf"></i> Terráli<sup>™</sup></h1>
    <p class="subtitulo-cabecalho">Sua Joia em Cerâmica Autoral</p>
    <nav>
        <a href="index.html" class="active">Início</a>
        <a href="novidades.html">Novidades</a>
        <a href="sobre.html">Sobre Nós</a>
        <a href="contato.html">Contato</a>
        <a href="carrinho.html">🛒 <span id="carrinho-contador">0</span></a>
    </nav>
</header>

<main>
    <section class="vitrine">
        <h2>Nossas Peças</h2>
        <div class="produtos-grid" id="produtos-grid">
            <!-- Os produtos serão inseridos aqui pelo JavaScript -->
        </div>
    </section>
</main>

<footer>
    <div class="footer-content">
        <div>
            <h4>Terráli<sup>™</sup></h4>
            <p>Peças artesanais com a pureza da natureza</p>
        </div>
        <div class="social-links">
            <a href="https://www.instagram.com/terrali_ceramicas/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/5519996576067" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
    <p>© 2026 Wilson Lopes Junior. Terráli<sup>™</sup></p>
</footer>

<script src="js/carrinho.js"></script>
<script>
    // Controle do Header Scrolled
    window.addEventListener('scroll', function() {
        const header = document.getElementById('cabecalho');
        if (window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    });

    // Carregamento dos Produtos
    fetch('dados/produtos.json')
        .then(response => response.json())
        .then(data => {
            const grid = document.getElementById('produtos-grid');
            grid.innerHTML = '';

            data.produtos.forEach(p => {
                const imagem = p.imagem || `imagens/produtos/${p.codigo}.jpg`;
                const produtoJS = {
                    codigo: p.codigo,
                    nome: p.descricao,
                    preco: parseFloat(p.preco.replace(',', '.')),
                    imagem: imagem
                };

                grid.innerHTML += `
                <div class="produto-card">
                    <img src="${imagem}" alt="${p.descricao}" onerror="this.src='imagens/placeholder.jpg'">
                    <div class="produto-info">
                        <h4>${p.descricao}</h4>
                        <span class="categoria-principal">${p.categoria || 'Cerâmica Autoral'}</span>
                        <p class="preco">R$ ${p.preco}</p>
                        <button onclick='window.carrinho.adicionar(${JSON.stringify(produtoJS)})' class="btn-adicionar">
                            <i class="fas fa-cart-plus"></i> Adicionar
                        </button>
                    </div>
                </div>`;
            });
        });
</script>
</body>
</html>
